version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=sensor_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    container_name: postgres_db_sensor

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=sensor_db
      - DB_USER=user
      - DB_PASS=password
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    container_name: django_app_sensor

volumes:
  postgres_data:
